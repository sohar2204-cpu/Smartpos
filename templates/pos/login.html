<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartPOS — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#0d0f12;color:#e8eaf2;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-wrap{width:100%;max-width:400px;padding:20px;}
.brand{text-align:center;margin-bottom:40px;}
.brand-icon{font-size:40px;margin-bottom:12px;}
.brand-name{font-size:22px;font-weight:600;color:#4f9cff;letter-spacing:.5px;}
.brand-sub{font-size:13px;color:#7a84a0;margin-top:4px;}
.card{background:#141720;border:1px solid #262d3d;border-radius:12px;padding:32px;}
.form-group{margin-bottom:16px;}
label{display:block;font-size:12px;font-weight:500;color:#7a84a0;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
input{width:100%;background:#1c2130;border:1px solid #262d3d;border-radius:8px;padding:11px 14px;font-size:14px;color:#e8eaf2;font-family:'DM Sans',sans-serif;outline:none;transition:border .15s;}
input:focus{border-color:#4f9cff;}
.btn{width:100%;background:#4f9cff;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px;transition:background .15s;}
.btn:hover{background:#3a8cf0;}
.error{background:rgba(255,95,109,.1);border:1px solid rgba(255,95,109,.25);color:#ff5f6d;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;}
.hint{text-align:center;font-size:12px;color:#7a84a0;margin-top:20px;font-family:'DM Mono',monospace;}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="brand">
    <div class="brand-icon">⬡</div>
    <div class="brand-name">SmartPOS</div>
    <div class="brand-sub">Smart Retail Point of Sale</div>
  </div>
  <div class="card">
    {% if messages %}
    {% for msg in messages %}
    <div class="error">{{ msg }}</div>
    {% endfor %}
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" autofocus required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn">Sign In →</button>
      <div style="text-align:center;margin-top:20px;font-size:13px;color:var(--muted);">
       Don't have an account?
       <a href="/register/" style="color:var(--accent);text-decoration:none;font-weight:500;">
       Create your store →
  </a>
</div>
      <div style="text-align:center;margin-top:14px;font-size:13px;color:#7a84a0;">Or use <a href="/pin-login/" style="color:#4f9cff;">PIN Login</a> for quick access</div>
    </form>
  </div>
  <div class="hint">Default: admin / admin123</div>
</div>
</body>
</html>
