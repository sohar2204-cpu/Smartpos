{% extends "pos/base.html" %}
{% block title %}{{ action }} Store — SmartPOS{% endblock %}
{% block page_title %}{{ action }} Store{% endblock %}
{% block content %}
<div style="max-width:500px;">
  <form method="post">
    {% csrf_token %}
    <div class="card">
      <div class="card-title">Store Details</div>
      <div class="form-group"><label>Store Name *</label><input type="text" name="name" value="{{ store.name|default:'' }}" required></div>
      <div class="form-group"><label>Phone</label><input type="text" name="phone" value="{{ store.phone|default:'' }}"></div>
      <div class="form-group"><label>Email</label><input type="email" name="email" value="{{ store.email|default:'' }}"></div>
      <div class="form-group"><label>Address</label><textarea name="address" rows="2">{{ store.address|default:'' }}</textarea></div>
      <div class="form-group"><label>Tax Rate (%)</label><input type="number" name="tax_rate" value="{{ store.tax_rate|default:'0' }}" step="0.01" min="0" max="100"></div>
      <div style="display:flex;gap:10px;">
        <button type="submit" class="btn btn-primary">{{ action }} Store</button>
        <a href="{% url 'stores' %}" class="btn btn-ghost">Cancel</a>
      </div>
    </div>
  </form>
</div>
{% endblock %}
