{% extends "pos/base.html" %}
{% block title %}Add User — SmartPOS{% endblock %}
{% block page_title %}Add User{% endblock %}
{% block content %}
<div style="max-width:500px;">
  <form method="post">
    {% csrf_token %}
    <div class="card">
      <div class="card-title">New User Account</div>
      <div class="grid-2">
        <div class="form-group"><label>First Name</label><input type="text" name="first_name"></div>
        <div class="form-group"><label>Last Name</label><input type="text" name="last_name"></div>
      </div>
      <div class="form-group"><label>Username *</label><input type="text" name="username" required></div>
      <div class="form-group"><label>Password *</label><input type="password" name="password" required></div>
      <div class="form-group">
        <label>Role</label>
        <select name="role">
          <option value="cashier">Cashier</option>
          <option value="manager">Manager</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div style="display:flex;gap:10px;">
        <button type="submit" class="btn btn-primary">Create User</button>
        <a href="{% url 'users' %}" class="btn btn-ghost">Cancel</a>
      </div>
    </div>
  </form>
</div>
{% endblock %}
